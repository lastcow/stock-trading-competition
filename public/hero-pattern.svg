<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <!-- Dots at intersections -->
      <circle cx="20" cy="20" r="1" fill="#0F172A" opacity="0.03"/>
      <!-- Faint horizontal lines -->
      <line x1="0" y1="20" x2="40" y2="20" stroke="#0F172A" stroke-width="0.5" opacity="0.03"/>
      <!-- Faint vertical lines -->
      <line x1="20" y1="0" x2="20" y2="40" stroke="#0F172A" stroke-width="0.5" opacity="0.03"/>
    </pattern>
  </defs>
  <rect width="400" height="400" fill="url(#grid)"/>
  <!-- Additional subtle decorative dots -->
  <circle cx="100" cy="100" r="1.5" fill="#0F172A" opacity="0.04"/>
  <circle cx="300" cy="200" r="1.5" fill="#0F172A" opacity="0.04"/>
  <circle cx="200" cy="300" r="1.5" fill="#0F172A" opacity="0.04"/>
  <circle cx="50" cy="350" r="1" fill="#0F172A" opacity="0.03"/>
  <circle cx="350" cy="50" r="1" fill="#0F172A" opacity="0.03"/>
</svg>