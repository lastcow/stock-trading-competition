services:
  - type: web
    name: stock-trading-competition
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: APP_SECRET
        sync: false
    healthCheckPath: /api/trpc/ping
